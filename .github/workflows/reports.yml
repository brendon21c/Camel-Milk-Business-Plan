name: Monthly Report Run

# Runs on the 1st of each month at 6:00 AM UTC (1 AM Central).
# Generates and delivers the report for each active proposition.
#
# To add a new proposition: duplicate the "Run report" step and update
# the --proposition-id value. Each proposition gets its own step so
# failures are reported individually and one bad run doesn't block others.
#
# Manual trigger: go to Actions → Monthly Report Run → Run workflow.
# The --force flag skips the "already ran this month" guard so you can
# re-run at any time without waiting for the next calendar month.

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC daily = 07:00 CST — getDuePropositions() decides what actually runs
  workflow_dispatch:        # manual trigger from GitHub Actions UI and admin panel Run Now button
    inputs:
      force:
        description: 'Pass --force to skip the already-ran guard'
        required: false
        default: false
        type: boolean
      proposition_id:
        description: 'Target a specific proposition ID (leave blank to run all due propositions)'
        required: false
        default: ''
        type: string
      regen_pdf:
        description: 'Regenerate PDF only — rebuilds PDF from saved content JSON and uploads to Supabase (no agents, no client email)'
        required: false
        default: false
        type: boolean
      report_id:
        description: 'Report ID to regenerate PDF for (required when regen_pdf is true)'
        required: false
        default: ''
        type: string

jobs:
  run-reports:
    name: Generate reports
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for GitHub Actions infrastructure early.
      # Required before June 2, 2026 when Node 20 is forced out.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Write all secrets to a .env file so dotenv picks them up normally.
      - name: Write .env from secrets
        run: |
          cat <<EOF > .env
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          BRAVE_SEARCH_KEY=${{ secrets.BRAVE_SEARCH_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          OPEN_FDA_API_KEY=${{ secrets.OPEN_FDA_API_KEY }}
          YOUTUBE_API_KEY=${{ secrets.YOUTUBE_API_KEY }}
          REDDIT_ENABLED=${{ secrets.REDDIT_ENABLED }}
          EXCHANGE_RATE_API_KEY=${{ secrets.EXCHANGE_RATE_API_KEY }}
          CENSUS_API_KEY=${{ secrets.CENSUS_API_KEY }}
          PERPLEXITY_API_KEY=${{ secrets.PERPLEXITY_API_KEY }}
          USDA_FDC_API_KEY=${{ secrets.USDA_FDC_API_KEY }}
          USDA_NASS_API_KEY=${{ secrets.USDA_NASS_API_KEY }}
          CRUNCHBASE_ENABLED=${{ secrets.CRUNCHBASE_ENABLED }}
          EOF

      # ── Active propositions ───────────────────────────────────────────────
      # Add one step per proposition. Copy this block and update the ID.
      # The step name shows up in the GitHub Actions log and failure emails.

      # ── PDF regeneration (admin panel Regen PDF button) ──────────────────────
      # Rebuilds the PDF from the saved content JSON and uploads it back to Supabase.
      # Report stays pending_review — no agents run, no client email sent.
      - name: Regen PDF — targeted report
        if: github.event.inputs.regen_pdf == 'true' && github.event.inputs.report_id != ''
        run: node run.js --regen-pdf --report-id ${{ github.event.inputs.report_id }} --upload

      # If a specific proposition_id was passed (e.g. from the admin panel Run Now button),
      # run only that proposition. Otherwise fall through to the scheduled per-proposition steps below.
      - name: Run report — targeted (admin panel trigger)
        if: github.event.inputs.proposition_id != '' && github.event.inputs.regen_pdf != 'true'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node run.js --proposition-id ${{ github.event.inputs.proposition_id }} $FORCE_FLAG

      # ── Active propositions ───────────────────────────────────────────────
      # These steps run on the cron schedule or when no specific proposition_id was provided.
      # Add one step per proposition. Copy this block and update the ID.
      # The step name shows up in the GitHub Actions log and failure emails.

      - name: Run report — B & I Camel Milk
        if: (github.event_name == 'schedule' || github.event.inputs.proposition_id == '') && github.event.inputs.regen_pdf != 'true'
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          node run.js --proposition-id 54f51272-d819-4d82-825a-15603ed48654 $FORCE_FLAG
